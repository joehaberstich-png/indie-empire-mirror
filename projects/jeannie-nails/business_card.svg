  <text x="300" y="295" font-family="Arial,sans-serif" font-size="7" fill="#6b4040" text-anchor="middle">✿ Walk-ins Welcome · Call to Book · facebook.com/jeanniesnails17 ✿</text>
  <!-- Nail polish accent dots -->
  <circle cx="40" cy="310" r="2" fill="#d4a0a0" opacity=".4"/>
  <circle cx="560" cy="310" r="2" fill="#d4a0a0" opacity=".4"/>
  <circle cx="300" cy="310" r="3" fill="#c0392b" opacity=".5"/>
</svg>

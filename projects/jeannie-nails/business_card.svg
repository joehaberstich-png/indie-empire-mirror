<svg width="600" height="340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#4a2c2c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a0a0"/>
      <stop offset="100%" style="stop-color:#f0c0c0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" rx="12" fill="url(#bg)"/>
  <!-- Decorative line -->
  <line x1="40" y1="80" x2="560" y2="80" stroke="#d4a0a0" stroke-opacity=".3" stroke-width="1"/>
  <line x1="40" y1="270" x2="560" y2="270" stroke="#d4a0a0" stroke-opacity=".3" stroke-width="1"/>
  <!-- Name -->
  <text x="300" y="55" font-family="Georgia,serif" font-size="22" fill="#fff" font-weight="bold" text-anchor="middle" letter-spacing="2">JEANNIE BOUTILER</text>
  <!-- Specialty badge -->
  <rect x="210" y="70" width="180" height="22" rx="11" fill="#c0392b"/>
  <text x="300" y="85" font-family="Arial,sans-serif" font-size="10" fill="#fff" font-weight="bold" text-anchor="middle" letter-spacing="1">★ INGROWN TOENAIL SPECIALIST</text>
  <!-- Subtitle -->
  <text x="300" y="115" font-family="Georgia,serif" font-size="14" fill="#d4a0a0" text-anchor="middle" letter-spacing="3">N A I L S</text>
  <!-- Services mini-list -->
  <text x="300" y="145" font-family="Arial,sans-serif" font-size="10" fill="#d4b0b0" text-anchor="middle">Pedicures · Manicures · Gel Nails · Extensions · Waxing · Ear Piercings · Nail Art</text>
  <!-- Phone -->
  <text x="300" y="190" font-family="Arial,sans-serif" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">(902) 885-7896</text>
  <!-- Hours -->

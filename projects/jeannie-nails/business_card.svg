  <text x="300" y="230" font-family="Arial,sans-serif" font-size="8" fill="#6b4040" text-anchor="middle">Atlantic Canada</text>
  <!-- Web -->
  <text x="300" y="255" font-family="Arial,sans-serif" font-size="9" fill="#d4a0a0" text-anchor="middle">jeannie-nails.vercel.app</text>
